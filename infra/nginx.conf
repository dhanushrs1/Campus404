events {
    worker_connections 1024;
}

http {
    # ── Global body size limit — must be >= the API's 20 MB limit ──────
    client_max_body_size 25M;

    # Protection against infinite loop / submission spamming (2 requests per second per IP)
    limit_req_zone $binary_remote_addr zone=judgelimit:10m rate=2r/s;

    server {
        listen 80;

        # Protect Judge submissions with aggressive limits
        location /api/judge/ {
            limit_req zone=judgelimit burst=5 nodelay;
            proxy_pass http://backend:8000/api/judge/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # File upload endpoint — disable buffering so large files stream cleanly
        location /api/admin/upload {
            proxy_pass http://backend:8000/api/admin/upload;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_request_buffering off;     # stream body directly to backend
            proxy_read_timeout 120s;         # allow slow uploads
            proxy_send_timeout 120s;
        }

        # Route everything starting with /api to the Python Backend
        # We preserve the /api/ path string so FastAPI's internal routing resolves it smoothly
        location /api/ {
            proxy_pass http://backend:8000/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Serve uploaded static files via FastAPI's StaticFiles mount
        location /uploads/ {
            proxy_pass http://backend:8000/uploads/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            # Cache uploaded images aggressively (immutable filenames via UUID)
            proxy_cache_valid 200 7d;
            add_header Cache-Control "public, max-age=604800, immutable";
        }

        # Route everything else to the React Frontend
        location / {
            proxy_pass http://frontend:3000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            
            # WebSocket Support for Vite HMR
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
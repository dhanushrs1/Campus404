events {
    worker_connections 1024;
}

http {
    # Protection against infinite loop / submission spamming (2 requests per second per IP)
    limit_req_zone $binary_remote_addr zone=judgelimit:10m rate=2r/s;

    server {
        listen 80;

        # Protect Judge submissions with aggressive limits
        location /api/judge/ {
            limit_req zone=judgelimit burst=5 nodelay;
            proxy_pass http://backend:8000/api/judge/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Route everything starting with /api to the Python Backend
        # We preserve the /api/ path string so FastAPI's internal routing resolves it smoothly
        location /api/ {
            proxy_pass http://backend:8000/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Route everything else to the React Frontend
        location / {
            proxy_pass http://frontend:3000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            
            # WebSocket Support for Vite HMR
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
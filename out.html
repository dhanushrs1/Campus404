  <style>
    /* Transplanted ChallengeBuilder.css modified for Jinja Admin base */
    .builder-container {
      display: flex;
      height: calc(100vh - 160px);
      width: 100%;
      background-color: var(--bg-base);
      color: var(--text-1);
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--bg-surface);
    }

    .left-pane {
      flex: 1;
      border-right: 1px solid var(--bg-surface);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      background-color: var(--bg-card);
      padding: 20px;
    }

    .left-pane::-webkit-scrollbar { width: 8px; }
    .left-pane::-webkit-scrollbar-track { background: var(--bg-card); }
    .left-pane::-webkit-scrollbar-thumb { background: var(--bg-surface); border-radius: 4px; }

    .right-pane {
      flex: 1.2;
      display: flex;
      flex-direction: column;
      background-color: var(--bg-base);
    }

    .form-group {
      margin-bottom: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-group label {
      color: var(--text-2);
      font-size: 13px;
      font-weight: 600;
    }

    .form-input, .form-select, .form-textarea {
      background-color: var(--bg-base);
      border: 1px solid var(--bg-surface);
      color: var(--text-1);
      padding: 10px 12px;
      border-radius: 6px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      outline: none;
      width: 100%;
    }

    .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--brand); }

    .form-textarea {
      font-family: 'JetBrains Mono', monospace;
      min-height: 150px;
      resize: vertical;
    }

    .test-cases-section {
      margin-top: 20px;
      border-top: 1px solid var(--bg-surface);
      padding-top: 20px;
    }

    .test-cases-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    .test-cases-header h2 {
      font-family: 'Sora', sans-serif;
      font-size: 16px;
      margin: 0;
      color: var(--text-1);
    }

    .test-case-row {
      background-color: var(--bg-base);
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      border: 1px solid var(--bg-surface);
    }

    .test-case-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--text-2);
      font-size: 13px;
      font-weight: 600;
    }

    .test-case-inputs { display: flex; gap: 15px; }
    .tc-col { flex: 1; display: flex; flex-direction: column; gap: 8px; }
    .tc-col label { font-size: 11px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.5px; }

    .test-case-inputs textarea {
      font-family: 'JetBrains Mono', monospace;
      background-color: var(--bg-surface);
      border: 1px solid transparent;
      color: var(--text-2);
      padding: 10px;
      border-radius: 6px;
      resize: vertical;
      min-height: 80px;
      font-size: 12px;
      outline: none;
      width: 100%;
    }
    .test-case-inputs textarea:focus { border-color: var(--brand); }

    .tab-bar {
      display: flex;
      background-color: var(--bg-card);
      padding: 8px 8px 0;
      border-bottom: 1px solid var(--bg-surface);
      gap: 5px;
      align-items: flex-end;
      overflow-x: auto;
    }
    .tab-bar::-webkit-scrollbar { height: 4px; }

    .file-tab {
      padding: 8px 12px;
      background-color: transparent;
      color: var(--text-3);
      border-radius: 6px 6px 0 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      border: 1px solid transparent;
      border-bottom: none;
      min-width: max-content;
    }

    .file-tab:hover { background-color: rgba(255, 255, 255, 0.02); color: var(--text-2); }
    .file-tab.active { background-color: var(--bg-base); color: var(--brand); border-color: var(--bg-surface); border-top: 2px solid var(--brand); }

    .file-name-input {
      background: transparent;
      border: none;
      color: inherit;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      outline: none;
      width: auto;
      min-width: 60px;
    }

    .file-close { opacity: 0.5; transition: opacity 0.2s; display: flex; align-items: center; justify-content: center; }
    .file-close:hover { opacity: 1; color: #ff4d4f; }

    .add-file-btn { padding: 8px; background: transparent; color: var(--text-3); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .add-file-btn:hover { color: var(--text-1); }

    .editor-container { flex: 1; position: relative; }
    .checkbox-label { display: flex; align-items: center; gap: 8px; color: var(--text-2); font-size: 13px; cursor: pointer; }
    
    .btn-secondary {
      background-color: var(--bg-surface);
      color: var(--text-1);
      border: 1px solid var(--bg-surface);
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      transition: border-color 0.2s;
    }
    .btn-secondary:hover { border-color: var(--text-3); }

    /* --- New Utility Classes for React Builder --- */
    .flex-center-between { display: flex; justify-content: space-between; align-items: center; }
    .flex-center-gap { display: flex; align-items: center; gap: 15px; }
    .flex-gap-15 { display: flex; gap: 15px; }
    .flex-1 { flex: 1; }
    .mb-20 { margin-bottom: 20px; }
    .mr-6 { margin-right: 6px; }
    .font-sora { font-family: 'Sora', sans-serif; margin: 0; font-size: 18px; }
    .min-h-80 { min-height: 80px; }
    .w-auto { width: auto; }
    .px-8 { padding-left: 8px; padding-right: 8px; }
    .py-4 { padding-top: 4px; padding-bottom: 4px; }
    .p-15-bottom { padding: 8px 15px; background-color: var(--bg-card); border-bottom: 1px solid var(--bg-surface); }
    .text-brand-small { color: var(--brand); font-size: 10px; }
    .text-danger { color: #ff4d4f; border-color: transparent; }
    .loading-state { padding: 40px; color: var(--text-2); }
  </style>

</head>

<script>

<script type="text/babel">
  const { useState, useEffect } = React;
  // Use Editor from CDN
  const Editor = monaco.editor;

  function ChallengeBuilder() {
    const { challengeId, prefillModuleId, modules } = window.INITIAL_DATA;

    const [isLoading, setIsLoading] = useState(challengeId !== null);
    const [isSaving, setIsSaving] = useState(false);
    
    const [title, setTitle] = useState('');
    const [moduleId, setModuleId] = useState(prefillModuleId || '');
    const [orderNumber, setOrderNumber] = useState(1);
    const [environment, setEnvironment] = useState('standard_script');
    const [description, setDescription] = useState('');
    const [instructions, setInstructions] = useState('');
    const [hintText, setHintText] = useState('');
    
    const [files, setFiles] = useState([
      { name: 'main.py', language: 'python', content: '# Write code here', is_entry_point: true }
    ]);
    const [activeFileIndex, setActiveFileIndex] = useState(0);
    const [testCases, setTestCases] = useState([]);

    // Hydration if Edit Mode
    useEffect(() => {
      if (challengeId) {
        fetch(`/api/admin/challenges/${challengeId}`)
          .then(res => res.json())
          .then(data => {
            setTitle(data.title || '');
            setModuleId(data.module_id || '');
            setOrderNumber(data.order_number || 1);
            setEnvironment(data.environment || 'standard_script');
            setDescription(data.description || '');
            setInstructions(data.instructions || '');
            setHintText(data.hint_text || '');
            
            if (data.files && data.files.length > 0) {
              setFiles(data.files);
            }
            if (data.test_cases) {
              setTestCases(data.test_cases);
            }
            setIsLoading(false);
          })
          .catch(err => {
            console.error(err);
            alert("Failed to load challenge data.");
            setIsLoading(false);
          });
      }
    }, [challengeId]);

    const handleAddFile = () => {
      setFiles([
        ...files, 
        { name: 'new_file.py', language: 'python', content: '', is_entry_point: false }
      ]);
      setActiveFileIndex(files.length);
    };

    const handleRemoveFile = (index) => {
      if (files.length <= 1) return;
      const newFiles = files.filter((_, i) => i !== index);
      setFiles(newFiles);
      if (activeFileIndex >= index) {
        setActiveFileIndex(Math.max(0, activeFileIndex - 1));
      }
    };

    const handleFileChange = (index, field, value) => {
      const newFiles = [...files];
      newFiles[index] = { ...newFiles[index], [field]: value };
      
      if (field === 'is_entry_point' && value === true) {
        newFiles.forEach((f, i) => { if (i !== index) f.is_entry_point = false; });
      }
      setFiles(newFiles);
    };

    const handleAddTestCase = () => {
      setTestCases([
        ...testCases,
        { input_data: '', expected_output: '', is_hidden: false }
      ]);
    };

    const handleSave = async () => {
      if (!title || !moduleId || !orderNumber) {
        alert("Please fill required fields: Title, Module, Order Number");
        return;
      }

      try {
        setIsSaving(true);
        const payload = {
          title,
          module_id: parseInt(moduleId),
          order_number: parseInt(orderNumber),
          description: description || null,
          environment,
          instructions: instructions || '',
          hint_text: hintText || null,
          files: files.map(f => ({
            name: f.name,
            language: f.language,
            content: f.content,
            is_entry_point: f.is_entry_point
          })),
          test_cases: testCases.map(t => ({
            input_data: t.input_data,
            expected_output: t.expected_output,
            is_hidden: t.is_hidden
          }))
        };

        const url = challengeId ? `/api/admin/challenges/${challengeId}` : '/api/admin/challenges';
        const method = challengeId ? 'PUT' : 'POST';

        const res = await fetch(url, {
          method,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.detail || "Failed to save challenge");
        }

        // Redirect back to challenges list on success
        window.location.href = `/admin/challenges?module_id=${moduleId}`;
      } catch (error) {
        console.error(error);
        alert(error.message);
      } finally {
        setIsSaving(false);
      }
    };

    if (isLoading) {
      return <div className="loading-state">Loading Challenge Data...</div>;
    }

    const activeFile = files[activeFileIndex];

    return (
      <div className="builder-container">
        {/* LEFT PANE */}
        <div className="left-pane">
          <div className="flex-center-between mb-20">
            <h2 className="font-sora">Challenge Configuration</h2>
            <button className="btn btn-primary" onClick={handleSave} disabled={isSaving}>
              <svg xmlns="http://www.w3.org/2000/svg" className="mr-6" style={ { width: '16px', height: '16px' } } viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
              {isSaving ? 'Saving...' : (challengeId ? 'Update Challenge' : 'Create Challenge')}
            </button>
          </div>

          <div className="form-group">
            <label>Challenge Title</label>
            <input className="form-input" type="text" value={title} onChange={e => setTitle(e.target.value)} />
          </div>

          <div className="flex-gap-15">
            <div className="form-group flex-1">
              <label>Module</label>
              <select className="form-select" value={moduleId} onChange={e => setModuleId(e.target.value)}>
                <option value="" disabled>Select a module...</option>
                {modules.map(m => (
                  <option key={m.id} value={m.id}>{m.title}</option>
                ))}
              </select>
            </div>
            <div className="form-group flex-1">
              <label>Order Number</label>
              <input className="form-input" type="number" value={orderNumber} onChange={e => setOrderNumber(e.target.value)} />
            </div>
            <div className="form-group flex-1">
              <label>Environment</label>
              <select className="form-select" value={environment} onChange={e => setEnvironment(e.target.value)}>
                <option value="standard_script">Standard Script (Single File)</option>
                <option value="multi_file_project">Multi-File Project</option>
                <option value="web_frontend">Web Frontend (HTML/CSS/JS)</option>
                <option value="database_query">Database Query (SQL/NoSQL)</option>
              </select>
            </div>
          </div>
          
          <div className="form-group">
            <label>Description (Optional intro text)</label>
            <textarea className="form-textarea min-h-80" value={description} onChange={e => setDescription(e.target.value)} />
          </div>

          <div className="form-group">
            <label>Instructions (Markdown)</label>
            <textarea className="form-textarea" placeholder="# Make a loop that..." value={instructions} onChange={e => setInstructions(e.target.value)} />
          </div>
          
          <div className="form-group">
            <label>Hint Text</label>
            <textarea className="form-textarea min-h-80" value={hintText} onChange={e => setHintText(e.target.value)} />
          </div>

          <div className="test-cases-section">
            <div className="test-cases-header">
              <h2>Test Cases</h2>
              <button className="btn-secondary" onClick={handleAddTestCase}>
                + Add Test Case
              </button>
            </div>
            
            {testCases.map((tc, idx) => (
              <div key={idx} className="test-case-row">
                <div className="test-case-header">
                  <span>Test Case {idx + 1}</span>
                  <div className="flex-center-gap">
                    <label className="checkbox-label">
                      <input type="checkbox" checked={tc.is_hidden} onChange={e => handleTestCaseChange(idx, 'is_hidden', e.target.checked)} />
                      Hidden
                    </label>
                    <button className="btn-secondary px-8 py-4 text-danger" onClick={() => handleRemoveTestCase(idx)}>
                      Remove
                    </button>
                  </div>
                </div>
                <div className="test-case-inputs">
                  <div className="tc-col">
                    <label>Input (stdin args/data)</label>
                    <textarea value={tc.input_data} onChange={e => handleTestCaseChange(idx, 'input_data', e.target.value)} />
                  </div>
                  <div className="tc-col">
                    <label>Expected Output (stdout)</label>
                    <textarea value={tc.expected_output} onChange={e => handleTestCaseChange(idx, 'expected_output', e.target.value)} />
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>

        {/* RIGHT PANE (VFS Editor) */}
        <div className="right-pane">
          <div className="tab-bar">
            {files.map((file, idx) => (
              <div key={idx} className={`file-tab ${idx === activeFileIndex ? 'active' : ''}`} onClick={() => setActiveFileIndex(idx)}>
                <input 
                  type="text" 
                  className="file-name-input"
                  value={file.name}
                  onChange={e => handleFileChange(idx, 'name', e.target.value)}
                  onClick={e => e.stopPropagation()}
                />
                {file.is_entry_point && <span className="text-brand-small">*Main</span>}
                {files.length > 1 && (
                  <span className="file-close" onClick={(e) => { e.stopPropagation(); handleRemoveFile(idx); }}>x</span>
                )}
              </div>
            ))}
            <button className="add-file-btn" onClick={handleAddFile}>+</button>
          </div>

          <div className="flex-center-gap p-15-bottom">
            <select 
              className="form-select w-auto py-4 px-8" 
              value={activeFile?.language || 'python'}
              onChange={e => handleFileChange(activeFileIndex, 'language', e.target.value)}
            >
              <option value="python">Python</option>
              <option value="html">HTML</option>
              <option value="css">CSS</option>
              <option value="javascript">JavaScript</option>
              <option value="json">JSON</option>
            </select>
            <label className="checkbox-label">
              <input type="checkbox" checked={activeFile?.is_entry_point || false} onChange={e => handleFileChange(activeFileIndex, 'is_entry_point', e.target.checked)} />
              Is Main Entry Point
            </label>
          </div>

          <div className="editor-container" style={ { display: 'flex', flexDirection: 'column', height: '100%' } }>
            <textarea
              style={ { flex: 1, width: '100%', height: '100%', padding: '15px', fontFamily: "'JetBrains Mono', monospace", fontSize: '14px', backgroundColor: '#1e1e1e', color: '#d4d4d4', border: 'none', resize: 'none', outline: 'none' } }
              value={activeFile?.content || ''}
              onChange={e => handleFileChange(activeFileIndex, 'content', e.target.value)}
              spellCheck="false"
            />
          </div>
        </div>
      </div>
    );
  }

  // Delay render to ensure Monaco is loaded
  setTimeout(() => {
    try {
      console.log('Mounting ChallengeBuilder...');
      const rootElement = document.getElementById('vfs-builder-root');
      if (!rootElement) {
        console.error('Mount point #vfs-builder-root not found!');
        return;
      }
      const root = ReactDOM.createRoot(rootElement);
      root.render(<ChallengeBuilder />);
      console.log('ChallengeBuilder mounted successfully.');
    } catch (err) {
      console.error('Failed to mount ChallengeBuilder:', err);
    }
  }, 100);
</script>


    </div>

  </main>
</div>


</body>
</html>
